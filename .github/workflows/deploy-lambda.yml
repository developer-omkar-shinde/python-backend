name: Deploy Onboarding Lambda

on:
  push:
    branches: [main]
    paths:
      - 'services/onboarding_service/**'
      - 'helper/**'
      - 'scripts/build_onboarding_lambda.sh'
      - 'lambda-config.json'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build and deploy onboarding Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read deployment config
        id: cfg
        run: |
          echo "function_name=$(jq -r '.lambdas.onboarding.function_name' lambda-config.json)" >> "$GITHUB_OUTPUT"
          echo "handler=$(jq -r '.lambdas.onboarding.handler' lambda-config.json)" >> "$GITHUB_OUTPUT"
          echo "region=$(jq -r '.lambdas.onboarding.region' lambda-config.json)" >> "$GITHUB_OUTPUT"

      - name: Build deployment package
        run: bash scripts/build_onboarding_lambda.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.cfg.outputs.region }}

      - name: Deploy to AWS Lambda
        env:
          FUNCTION_NAME: ${{ steps.cfg.outputs.function_name }}
          HANDLER: ${{ steps.cfg.outputs.handler }}
          AWS_REGION: ${{ steps.cfg.outputs.region }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://dist/onboarding-lambda.zip \
            --region "$AWS_REGION"

          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME" \
            --region "$AWS_REGION"

          aws lambda update-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --handler "$HANDLER" \
            --region "$AWS_REGION"

          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME" \
            --region "$AWS_REGION"

          echo "Deployed ${GITHUB_SHA} to ${FUNCTION_NAME}"
